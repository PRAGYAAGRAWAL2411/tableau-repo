<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Piechart Extension</title>
    <!-- Include the Tableau Extensions API -->
    <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
    <!-- Include Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <a id="card-link" href="#" target="_blank" style="text-decoration: none; color: inherit; display: block;">
        <div class="card">
            <div class="card-header">
                <h1 id="field-header">Ample Prive</h1>
            </div>
            <div class="card-body">
                <div class="stats">
                    <div class="stat-number" id="total-count">0</div>
                    <div class="stat-label">Total enrollments</div>
                </div>

                <div class="chart-container" style="position: relative; height: 220px; width: 100%;">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </a>

    <script src="js/app.js"></script>
</body>

</html>
